<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>her favorites</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Caveat:wght@500;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --room-1:#140f1b;
    --room-2:#241a30;
    --light-warm:#FFD98A;
    --page:#FBF3E6;
    --page-2:#F4EADA;
    --page-edge:#DCC9A8;
    --ink:#4B3B63;
    --lilac:#B9A6DC;
    --pink:#F3C6D0;
    --sage:#9CAF88;
    --yellow:#F4D35E;
    --gold:#E3B23C;
    --cover:#3a2a4a;
  }
  *{box-sizing:border-box;}
  body.fav-body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle 520px at 50% 6%, rgba(255,217,138,.12), transparent 62%),
      radial-gradient(ellipse 65% 40% at 12% 92%, rgba(75,59,99,.4), transparent 70%),
      radial-gradient(ellipse 65% 40% at 88% 92%, rgba(185,166,220,.16), transparent 70%),
      radial-gradient(ellipse 50% 30% at 50% 40%, rgba(91,69,116,.25), transparent 70%),
      linear-gradient(180deg, #0d0a17 0%, #191228 28%, #241a30 58%, #302239 100%);
    font-family:'Quicksand', sans-serif;
    color:var(--page);
    overflow-x:hidden;
    padding-bottom:60px;
  }

  /* ---- night window scene ---- */
  .window-wrap{ display:flex; justify-content:center; padding-top:26px; }
  .window-frame{
    position:relative; width:min(520px,88%);
    padding:16px 16px 20px;
    border-radius:18px 18px 8px 8px;
    background:linear-gradient(160deg,#5b4574,#2c2038 60%,#221833);
    box-shadow:0 35px 70px rgba(0,0,0,.55), inset 0 0 0 4px rgba(255,255,255,.05);
  }
  .sky{
    position:relative; height:190px; border-radius:8px; overflow:hidden;
    background:linear-gradient(180deg,#0a0818 0%,#1a1030 30%,#3a2350 62%,#5c3a5e 100%);
  }
  .moon{
    position:absolute; top:22px; right:34px; width:38px; height:38px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFF6DD, #FFD98A 70%);
    box-shadow:0 0 30px 10px rgba(255,217,138,.35);
  }
  .star{ position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:.8; animation:starTwinkle 3.2s ease-in-out infinite; }
  @keyframes starTwinkle{ 0%,100%{opacity:.3;} 50%{opacity:1;} }
  .mullion-v{ position:absolute; left:50%; top:0; bottom:0; width:2px; background:rgba(255,255,255,.18); transform:translateX(-50%); }
  .mullion-h{ position:absolute; top:50%; left:0; right:0; height:2px; background:rgba(255,255,255,.18); transform:translateY(-50%); }
  .sill{ width:min(560px,92%); height:14px; margin:0 auto; background:linear-gradient(180deg,#2c2038,#1a1224); border-radius:0 0 8px 8px; box-shadow:0 10px 20px rgba(0,0,0,.4); }

  .lights-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:0 6px; margin-bottom:-6px; position:relative; z-index:3;
  }
  .wbulb{
    width:9px; height:9px; border-radius:50%; background:var(--light-warm);
    box-shadow:0 0 8px 3px rgba(255,217,138,.65);
    animation:twinkle 2.4s ease-in-out infinite;
  }
  .wbulb:nth-child(6n+1){ transform:translateY(6px); }
  .wbulb:nth-child(6n+2){ transform:translateY(12px); animation-delay:.3s; }
  .wbulb:nth-child(6n+3){ transform:translateY(6px); background:var(--pink); box-shadow:0 0 8px 3px rgba(243,198,208,.65); animation-delay:.6s; }
  .wbulb:nth-child(6n+4){ transform:translateY(0px); animation-delay:.9s; }
  .wbulb:nth-child(6n+5){ transform:translateY(6px); background:var(--lilac); box-shadow:0 0 8px 3px rgba(185,166,220,.65); animation-delay:1.2s; }
  .wbulb:nth-child(6n+6){ transform:translateY(12px); animation-delay:1.5s; }
  @keyframes twinkle{ 0%,100%{ opacity:.5; transform-origin:center; } 50%{ opacity:1; } }

  .fav-hero{ text-align:center; margin:6px auto 26px; padding:0 20px; }
  .fav-eyebrow{ font-family:'Caveat', cursive; font-size:1.3rem; color:var(--light-warm); }
  .fav-title{ font-family:'Fraunces', serif; font-style:italic; font-weight:600; font-size:clamp(2rem, 5vw, 3.1rem); margin:2px 0 8px; color:var(--page); }
  .fav-sub{ color:var(--lilac); font-size:.95rem; max-width:480px; margin:0 auto; opacity:.85; }

  .stage{ 
    max-width:820px; 
    margin:0 auto; 
    padding:0 18px; 
    perspective:2000px;
    scroll-margin-top: 200px;
  }

  /* ---- closed book cover ---- */
  .cover{
    background: linear-gradient(155deg, #4a3560, var(--cover) 60%, #2c2038);
    border-radius:10px 16px 16px 10px;
    box-shadow: 0 30px 70px rgba(0,0,0,.55), inset -10px 0 30px rgba(0,0,0,.35), 6px 0 0 #2c2038, 10px 0 0 rgba(0,0,0,.3);
    min-height:420px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:16px; padding:40px 30px;
    cursor:pointer;
    transform-origin:left center;
    transition:transform .8s cubic-bezier(.5,0,.2,1), opacity .6s ease;
    border:1px solid rgba(255,217,138,.15);
  }
  .cover.opened{ transform:rotateY(-130deg); opacity:0; pointer-events:none; }
  .cover-ornament{ width:54px; height:54px; opacity:.8; }
  .cover-title{ font-family:'Fraunces', serif; font-style:italic; font-weight:600; font-size:1.7rem; color:var(--light-warm); line-height:1.25; }
  .cover-hint{ font-family:'Caveat', cursive; font-size:1.15rem; color:var(--lilac); }

  /* ---- open book spread ---- */
    .book{
    display:none;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .55s ease, opacity .55s ease;
  }
  .book.show{ display:grid; }
  .book.turning-next{ transform:rotateY(-28deg) translateX(-60px) scale(.97); opacity:.1; }
  .book.turning-prev{ transform:rotateY(28deg) translateX(60px) scale(.97); opacity:.1; }

  .spread{
    display:grid; grid-template-columns:1fr 1fr;
    background:var(--page);
    border-radius:14px;
    box-shadow:0 35px 70px rgba(0,0,0,.5);
    min-height:440px;
    overflow:hidden;
  }
  .leaf{
    padding:34px 30px 26px;
    position:relative;
    display:flex; flex-direction:column;
    color:var(--ink);
  }
  .leaf.left{ background:var(--page); box-shadow:inset -18px 0 24px -20px rgba(0,0,0,.35); }
  .leaf.right{ background:var(--page-2); box-shadow:inset 18px 0 24px -20px rgba(0,0,0,.35); }
  .spine{
    position:absolute; left:50%; top:0; bottom:0; width:26px; transform:translateX(-50%);
    background:linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,.05) 30%, rgba(0,0,0,.05) 70%, rgba(0,0,0,.18));
    pointer-events:none; z-index:2;
  }

  .page-label{ font-family:'Caveat', cursive; font-size:1.05rem; color:var(--gold); margin-bottom:4px; }
  .leaf.right .page-label{ text-align:right; }
  .page-heading{ font-family:'Fraunces', serif; font-weight:600; font-size:1.25rem; margin:0 0 16px; }
  .leaf.right .page-heading{ text-align:right; }

  .leaf-body{ flex:1; display:flex; align-items:center; justify-content:center; }

  .polaroid{
    background:#fff; border-radius:8px; padding:10px 10px 14px;
    box-shadow:0 10px 20px rgba(75,59,99,.18);
    width:100%; max-width:220px;
    transform:rotate(-1.5deg);
  }
  .leaf.right .polaroid{ transform:rotate(1.5deg); }
  .polaroid img{ width:100%; height:150px; object-fit:cover; border-radius:5px; display:block; background:var(--page-edge); }
  .polaroid .cap{ font-family:'Caveat', cursive; font-weight:700; font-size:1.3rem; text-align:center; margin-top:8px; color:var(--ink); }
  .polaroid .sub{ font-size:.7rem; color:#8a7ba0; text-align:center; }

  .art-frame{ width:100%; height:150px; border-radius:5px; overflow:hidden; }
  .art-frame svg{ width:100%; height:100%; }

  .word-block{
    width:100%; max-width:220px; height:180px; border-radius:8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow:0 10px 20px rgba(75,59,99,.18);
  }
  .word-block .word{ font-family:'Fraunces', serif; font-style:italic; font-weight:600; font-size:1.6rem; }
  .word-block .tag{ font-family:'Quicksand'; font-size:.68rem; letter-spacing:1px; text-transform:uppercase; opacity:.75; margin-top:6px; }

  .empty-slot{
    width:100%; max-width:220px; height:180px; border-radius:8px;
    border:2px dashed #cbb9e6; background:#fbf8ff;
    display:flex; align-items:center; justify-content:center; text-align:center;
    color:#9d8bc0; font-family:'Caveat', cursive; font-size:1.1rem; padding:10px;
  }

  .book-nav{ display:flex; align-items:center; justify-content:center; gap:22px; margin-top:24px; }
  .nav-btn{
    background:var(--lilac); color:#fff; border:none; width:40px; height:40px; border-radius:50%;
    font-size:1.1rem; cursor:pointer; box-shadow:0 6px 14px rgba(75,59,99,.35);
    transition:transform .15s ease, background .15s ease;
  }
  .nav-btn:hover{ background:var(--ink); transform:scale(1.08); }
  .nav-btn:disabled{ opacity:.3; cursor:default; }
  .nav-btn:disabled:hover{ background:var(--lilac); transform:none; }
  .dots{ display:flex; gap:8px; }
  .dot{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.25); cursor:pointer; transition:background .2s ease, transform .2s ease; }
  .dot.active{ background:var(--light-warm); transform:scale(1.3); }

  @media (max-width:620px){
    .spread{ grid-template-columns:1fr; }
    .spine{ display:none; }
    .leaf.left{ box-shadow:none; }
    .leaf.right{ box-shadow:none; }
    .cover{ min-height:360px; }
  }
</style>
</head>
<body class="fav-body">

<nav class="site-nav">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><path d="M6 9c0-3 2-5 6-5s6 2 6 5v6c0 2.8-2.7 5-6 5s-6-2.2-6-5V9z" fill="#B9A6DC"/><path d="M8 8l-2-4 4 2M16 8l2-4-4 2" stroke="#4B3B63" stroke-width="1.4" fill="none" stroke-linecap="round"/><circle cx="9.5" cy="12" r="1" fill="#4B3B63"/><circle cx="14.5" cy="12" r="1" fill="#4B3B63"/></svg>
    <span class="label">for you</span>
  </div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="songs.html">Songs</a>
    <a href="idols.html" class="active">Favs</a>
  </div>
</nav>

<div class="window-wrap">
  <div class="window-frame">
    <div class="lights-row" id="lightsRow"></div>
    <div class="sky">
      <div class="moon"></div>
      <div class="stars" id="stars"></div>
      <div class="mullion-v"></div>
      <div class="mullion-h"></div>
    </div>
  </div>
</div>
<div class="sill"></div>

<div class="fav-hero">
  <div class="fav-eyebrow">a little book for you</div>
  <h1 class="fav-title">mga trippings mo on the top of my head (??)</h1>
  <p class="fav-sub">two things per page, kept somewhere dim and warm.</p>
</div>

<div class="stage">
  <div class="cover" id="cover">
    <svg class="cover-ornament" viewBox="0 0 24 24" fill="none"><path d="M6 9c0-3 2-5 6-5s6 2 6 5v6c0 2.8-2.7 5-6 5s-6-2.2-6-5V9z" fill="#FFD98A"/></svg>
    <div class="cover-title">Brilat Rivera,<br>kept between these pages</div>
    <div class="cover-hint">tap to open</div>
  </div>

    <div class="book" id="book">
    <div class="spread" id="spread">
      <div class="leaf left" id="leafLeft"></div>
      <div class="spine"></div>
      <div class="leaf right" id="leafRight"></div>
    </div>
  </div>

  <div class="book-nav" id="bookNav" style="display:none;">
    <button class="nav-btn" id="prevBtn" aria-label="previous page">‹</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn" aria-label="next page">›</button>
  </div>
</div>

<script>
// window scene: fairy lights draped along the frame + scattered stars
const lightsRow = document.getElementById('lightsRow');
for (let i = 0; i < 18; i++) {
  const b = document.createElement('span');
  b.className = 'wbulb';
  lightsRow.appendChild(b);
}
const starsEl = document.getElementById('stars');
const starPositions = [
  [8,20],[18,45],[30,12],[42,60],[55,25],[65,50],[76,15],[85,38],
  [15,70],[38,80],[60,72],[80,68],[25,30],[50,10],[70,85],[90,20]
];
starPositions.forEach(([x,y]) => {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = x + '%';
  s.style.top = y + '%';
  s.style.animationDelay = (Math.random()*3).toFixed(2) + 's';
  starsEl.appendChild(s);
});

// custom illustration for the one item with no reliable free photo (Dubai chewy cookie)
const dubaiCookieArt = `<svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#F3C6D0"/><ellipse cx="50" cy="58" rx="34" ry="24" fill="#efe3d0"/><path d="M22 52c6-10 50-10 56 0" stroke="#7a5a2e" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="36" cy="46" r="4" fill="#9CAF88"/><circle cx="50" cy="42" r="4" fill="#9CAF88"/><circle cx="64" cy="47" r="4" fill="#9CAF88"/><path d="M30 60q20 14 40 0" stroke="#c98a3e" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
const fgSlotArt = `<svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="14" fill="#E8DFF5"/><path d="M26 78c0-14 11-22 24-22s24 8 24 22" fill="#E8DFF5"/></svg>`;

// pages: each has a left leaf and right leaf definition
const pages = [
  {
    left: { type:'photo', img:'assets/images/dcc.jpg', cap:'dubai chewy cookie', sub:'pistachio, kadayif, marshmallow' },
    right:{ type:'photo', img:'assets/images/cookies.jpg', cap:'cookies', sub:'any kind' },
    heading:"bigback-ery dejk kumain ka na ng maayos boy"
  },
  {
    left: { type:'photo', img:'assets/images/oatside.jpg', cap:'oatside — yung black', sub:'never yung brown tsk tsk' },
    right:{ type:'photo', img:'assets/images/letters.jpg', cap:'handwritten letters', sub:'written by hand, kept forever' },
    heading:"wow!"
  },
  {
    left: { type:'photo', img:'assets/images/cats.jpg', cap:'cats', sub:'' },
    right:{ type:'word', word:'sage green', bg:'#9CAF88', color:'#fff', tag:'wins, always', tag2:'yellow', bg2:'#F4D35E', color2:'#4B3B63' },
    heading:"pale yellow's good tho."
  },
  {
     left: { type:'photo', img:'assets/images/song9.jpg', cap:'kamalayan', sub:'BYE B26...' },
    right:{ type:'photo', img:'assets/images/song13.jpg', cap:'lithium', sub:'jobrief AHWHAHAH' },
    heading:'2 groups of ppl from g9 ??'
  },
  {
    left: { type:'photo', img:'assets/images/fg1.jpg', cap:'yiee ang sweet so nakakadyabetes', sub:'' },
    right:{ type:'photo', img:'assets/images/fg2.jpg', cap:'wow!', sub:'' },
    heading:'aww ang senti AHWHAHAHHA'
  }
];

let current = 0;
const bookEl = document.getElementById('book');
const coverEl = document.getElementById('cover');
const leafLeft = document.getElementById('leafLeft');
const leafRight = document.getElementById('leafRight');
const bookNav = document.getElementById('bookNav');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

pages.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

function leafContent(item, side){
  if (item.type === 'empty') {
    return `<div class="leaf-body"><div class="empty-slot">${fgSlotArt}<div style="margin-top:6px;">tap to add<br>her photo here</div></div></div>`;
  }
  if (item.type === 'word') {
    let block = `<div class="word-block" style="background:${item.bg}"><div class="word" style="color:${item.color}">${item.word}</div>${item.tag ? `<div class="tag" style="color:${item.color}">${item.tag}</div>` : ''}</div>`;
    if (item.tag2) {
      // second small color card stacked for the sage/yellow comparison page
      block += `<div class="word-block" style="background:${item.bg2}; margin-top:14px; height:70px;"><div class="word" style="font-size:1.1rem; color:${item.color2}">${item.tag2}</div><div class="tag" style="color:${item.color2}">runner-up</div></div>`;
      block = `<div style="display:flex; flex-direction:column; align-items:center;">${block}</div>`;
    }
    return `<div class="leaf-body">${block}</div>`;
  }
  const media = item.art ? item.art : `<img src="${item.img}" alt="${item.cap}" loading="lazy" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{style:'width:100%;height:150px;border-radius:5px;background:linear-gradient(145deg,#F3C6D0,#B9A6DC);display:flex;align-items:center;justify-content:center;color:#4B3B63;font-family:Caveat,cursive;font-size:1rem;text-align:center;padding:8px;',innerText:'photo blocked by preview — opens fine in a real browser'}))">`;
  return `<div class="leaf-body"><div class="polaroid"><div class="art-frame">${media}</div><div class="cap">${item.cap}</div>${item.sub ? `<div class="sub">${item.sub}</div>` : ''}</div></div>`;
}

function render(i){
  const p = pages[i];
  leafLeft.innerHTML = `<div class="page-label">page ${i*2+1}</div><div class="page-heading">${p.heading}</div>` + leafContent(p.left, 'left');
  leafRight.innerHTML = `<div class="page-label">page ${i*2+2}</div><div class="page-heading">&nbsp;</div>` + leafContent(p.right, 'right');
  [...dotsEl.children].forEach((d, idx) => d.classList.toggle('active', idx === i));
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === pages.length - 1;
}

function goTo(target){
  if (target === current) return;
  const dir = target > current ? 'turning-next' : 'turning-prev';
  bookEl.classList.add(dir);
  setTimeout(() => {
    current = target;
    render(current);
    bookEl.classList.remove(dir);
  }, 260);
}

prevBtn.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
nextBtn.addEventListener('click', () => { if (current < pages.length - 1) goTo(current + 1); });

coverEl.addEventListener('click', () => {
  coverEl.classList.add('opened');
  bookEl.classList.add('show');
  render(0);
  setTimeout(() => {
    bookNav.style.display = 'flex';
    bookEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 350);
});
</script>

</body>
</html>
